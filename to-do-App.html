<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-Do-App</title>
    <link rel="stylesheet" href="./to-do-App.css">

</head>

<body>

<div class="container">

    <!--  HEADEr -->

    <header class="header">

        <div class="logo">

            <div class="logo-icon">
                <i class="fa-solid fa-check"></i>
            </div>

            <div>
                <h1>My Tasks</h1>
                <p>Stay organized. Get things done.</p>
            </div>

        </div>

        <button class="theme-btn">
            <i class="fa-regular fa-sun"></i>
        </button>

    </header>



 <!-- Input -->

    <section class="input-section">

        <input
            type="text"
            id="taskInput"
            placeholder="Add a new task..."
        >

        <button id="addTaskBtn">
            <i class="fa-solid fa-plus"></i>
            Add
        </button>

    </section>



 <!--  FILTERS -->

    <section class="filters">

        <div class="filter-buttons">

            <button class="filter active" data-filter="all">
                All
            </button>

            <button class="filter" data-filter="pending">
                Pending
            </button>

            <button class="filter" data-filter="completed">
                Completed
            </button>

        </div>

        <span id="tasksLeft">
            0 tasks left
        </span>

    </section>



    <!-- TASK LIST  -->

    <section id="taskList">

<!-- JavaScript will insert task cards here -->

    </section>



<!-- FOOTER  -->

    <footer class="footer">

        <button id="clearCompleted">

            <i class="fa-regular fa-trash-can"></i>

            Clear Completed

        </button>

        <span id="completedCount">
            0 of 0 tasks completed
        </span>

    </footer>



    <!--  BOTTOM NAV  -->

    <nav class="bottom-nav">

        <div class="nav-item active">

            <i class="fa-solid fa-list"></i>

            <span>Tasks</span>

        </div>

        <div class="nav-item">

            <i class="fa-solid fa-chart-simple"></i>

            <span>Stats</span>

        </div>

        <div class="nav-item">

            <i class="fa-solid fa-gear"></i>

            <span>Settings</span>

        </div>

    </nav>

</div>



<!-- TASK TEMPLATE -->

<template id="taskTemplate">

    <div class="task-card">

        <div class="task-left">

            <input
                type="checkbox"
                class="task-check"
            >

            <div class="task-details">

                <h3 class="task-title">
                    Task Name
                </h3>

                <div class="task-date">

                    <i class="fa-regular fa-calendar"></i>

                    <span>May 20, 2025</span>

                </div>

            </div>

        </div>


        <div class="task-right">

            <span class="category">
                Work
            </span>

            <button class="delete-btn">

                <i class="fa-solid fa-ellipsis-vertical"></i>

            </button>

        </div>

    </div>

</template>



<!-- JavaScript -->

<script src="to-do-app.js"></script>

</body>
</html>
